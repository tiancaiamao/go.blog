<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Gate Bridge - 3D Simulation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
        }
        #canvas { display: block; }
        
        #controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 20, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 180, 100, 0.2);
            border-radius: 16px;
            padding: 24px;
            width: 300px;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        
        h1 {
            color: #f4a460;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(244, 164, 96, 0.5);
        }
        
        .control-group {
            margin-bottom: 18px;
        }
        
        .control-group label {
            display: flex;
            justify-content: space-between;
            color: #ccc;
            font-size: 13px;
            margin-bottom: 8px;
        }
        
        .control-group label span {
            color: #f4a460;
            font-weight: 600;
        }
        
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f4a460, #cd853f);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(244, 164, 96, 0.5);
            transition: transform 0.2s;
        }
        
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        
        .time-display {
            text-align: center;
            font-size: 32px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            margin: 15px 0;
            font-weight: 300;
            letter-spacing: 2px;
        }
        
        #fps {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 20, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 200, 255, 0.3);
            border-radius: 8px;
            padding: 10px 16px;
            color: #64c8ff;
            font-size: 14px;
            font-weight: 600;
            z-index: 100;
        }
        
        #info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 20, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 20px;
            color: #888;
            font-size: 12px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="controls">
        <h1>🌉 GOLDEN GATE BRIDGE</h1>
        
        <div class="time-display" id="timeDisplay">12:00</div>
        
        <div class="control-group">
            <label>Time of Day <span id="timeValue">12:00</span></label>
            <input type="range" id="timeSlider" min="0" max="24" step="0.1" value="12">
        </div>
        
        <div class="control-group">
            <label>Fog Density <span id="fogValue">30%</span></label>
            <input type="range" id="fogSlider" min="0" max="100" step="1" value="30">
        </div>
        
        <div class="control-group">
            <label>Traffic Density <span id="trafficValue">50%</span></label>
            <input type="range" id="trafficSlider" min="0" max="100" step="1" value="50">
        </div>
        
        <div class="control-group">
            <label>Camera Distance <span id="zoomValue">100</span></label>
            <input type="range" id="zoomSlider" min="50" max="300" step="5" value="100">
        </div>
    </div>
    
    <div id="fps">FPS: --</div>
    <div id="info">Drag to orbit • Scroll to zoom</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // ============ GLOBALS ============
        let scene, camera, renderer, composer, controls;
        let sunLight, ambientLight, hemisphereLight;
        let water, waterMaterial;
        let bridgeGroup, carsGroup;
        let fogParticles;
        let birds = [];
        let ships = [];
        let clock = new THREE.Clock();
        let frameCount = 0;
        let lastFpsTime = 0;

        // Simulation parameters
        const params = {
            time: 12,
            fogDensity: 30,
            trafficDensity: 50,
            zoomDistance: 100
        };

        // ============ INITIALIZATION ============
        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);

            // Camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 3000);
            camera.position.set(80, 40, 100);

            // Renderer
            renderer = new THREE.WebGLRenderer({ 
                canvas: document.getElementById('canvas'),
                antialias: true,
                powerPreference: 'high-performance'
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2.1;
            controls.minDistance = 30;
            controls.maxDistance = 500;

            // Post-processing
            setupPostProcessing();

            // Lighting
            setupLighting();

            // Create scene elements
            createWater();
            createBridge();
            createTerrain();
            createSkyline();
            createCars();
            createShips();
            createBirds();
            createFogSystem();
            createStreetLights();

            // Event listeners
            setupEventListeners();

            // Start animation
            animate();
        }

        // ============ POST PROCESSING ============
        function setupPostProcessing() {
            composer = new EffectComposer(renderer);
            
            const renderPass = new RenderPass(scene, camera);
            composer.addPass(renderPass);
            
            const bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                0.4,  // strength
                0.4,  // radius
                0.85  // threshold
            );
            composer.addPass(bloomPass);
            
            const outputPass = new OutputPass();
            composer.addPass(outputPass);
        }

        // ============ LIGHTING ============
        function setupLighting() {
            // Sun light
            sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
            sunLight.position.set(100, 100, 50);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            sunLight.shadow.camera.near = 10;
            sunLight.shadow.camera.far = 500;
            sunLight.shadow.camera.left = -200;
            sunLight.shadow.camera.right = 200;
            sunLight.shadow.camera.top = 200;
            sunLight.shadow.camera.bottom = -200;
            sunLight.shadow.bias = -0.0001;
            scene.add(sunLight);

            // Ambient light
            ambientLight = new THREE.AmbientLight(0x404060, 0.4);
            scene.add(ambientLight);

            // Hemisphere light
            hemisphereLight = new THREE.HemisphereLight(0x87ceeb, 0x3d5c5c, 0.5);
            scene.add(hemisphereLight);
        }

        function updateLighting() {
            const t = params.time;
            const dayProgress = t / 24;
            
            // Sun position (arc across sky)
            const sunAngle = (dayProgress - 0.25) * Math.PI * 2;
            const sunHeight = Math.sin(sunAngle);
            const sunX = Math.cos(sunAngle) * 200;
            
            sunLight.position.set(sunX, Math.max(sunHeight * 200, 10), 50);
            
            // Calculate day/night factors
            const isDay = sunHeight > -0.1;
            const dayFactor = Math.max(0, Math.min(1, (sunHeight + 0.1) / 0.4));
            const nightFactor = 1 - dayFactor;
            
            // Sun intensity and color
            if (isDay) {
                sunLight.intensity = 0.3 + dayFactor * 1.5;
                
                // Sun color transitions
                if (sunHeight < 0.2) {
                    // Golden hour
                    const factor = 1 - sunHeight / 0.2;
                    sunLight.color.setHex(lerpColor(0xffffff, 0xffa500, factor));
                } else {
                    sunLight.color.setHex(0xfffaf0);
                }
                
                // Sky color
                const skyBlue = lerpColor(0xff7f50, 0x87ceeb, dayFactor);
                scene.background.setHex(skyBlue);
                
                // Ambient
                ambientLight.intensity = 0.2 + dayFactor * 0.4;
                ambientLight.color.setHex(lerpColor(0x404060, 0x808090, dayFactor));
                
                // Hemisphere
                hemisphereLight.intensity = 0.3 + dayFactor * 0.4;
                hemisphereLight.groundColor.setHex(lerpColor(0x3d5c5c, 0x228b22, dayFactor));
                
                // Bloom
                composer.passes[1].strength = 0.2;
            } else {
                // Night
                sunLight.intensity = 0.05;
                sunLight.color.setHex(0x4466aa);
                scene.background.setHex(0x0a1628);
                
                ambientLight.intensity = 0.08;
                ambientLight.color.setHex(0x1a1a3a);
                
                hemisphereLight.intensity = 0.1;
                hemisphereLight.groundColor.setHex(0x0a1520);
                hemisphereLight.color.setHex(0x1a2a4a);
                
                // Strong bloom at night for lights
                composer.passes[1].strength = 0.8;
            }
            
            // Update fog color to match sky
            updateFogColor();
            
            // Update car lights visibility
            updateCarLights();
        }

        function lerpColor(c1, c2, t) {
            const r1 = (c1 >> 16) & 255, g1 = (c1 >> 8) & 255, b1 = c1 & 255;
            const r2 = (c2 >> 16) & 255, g2 = (c2 >> 8) & 255, b2 = c2 & 255;
            const r = Math.round(r1 + (r2 - r1) * t);
            const g = Math.round(g1 + (g2 - g1) * t);
            const b = Math.round(b1 + (b2 - b1) * t);
            return (r << 16) | (g << 8) | b;
        }

        // ============ WATER ============
        function createWater() {
            const waterGeometry = new THREE.PlaneGeometry(2000, 2000, 128, 128);
            
            waterMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uSunPosition: { value: new THREE.Vector3(100, 100, 50) },
                    uSunIntensity: { value: 1.5 },
                    uFogColor: { value: new THREE.Color(0x87ceeb) },
                    uFogDensity: { value: 0.3 },
                    uIsNight: { value: 0 }
                },
                vertexShader: `
                    uniform float uTime;
                    varying vec2 vUv;
                    varying vec3 vWorldPos;
                    varying vec3 vNormal;
                    varying float vFogDepth;
                    
                    void main() {
                        vUv = uv;
                        vec3 pos = position;
                        
                        // Wave displacement
                        float wave1 = sin(pos.x * 0.02 + uTime * 0.5) * 1.5;
                        float wave2 = sin(pos.y * 0.03 + uTime * 0.7) * 1.0;
                        float wave3 = sin((pos.x + pos.y) * 0.015 + uTime * 0.3) * 2.0;
                        pos.z += wave1 + wave2 + wave3;
                        
                        vec4 worldPos = modelMatrix * vec4(pos, 1.0);
                        vWorldPos = worldPos.xyz;
                        vNormal = normalize(normalMatrix * vec3(
                            -cos(pos.x * 0.02 + uTime * 0.5) * 0.03,
                            -cos(pos.y * 0.03 + uTime * 0.7) * 0.03,
                            1.0
                        ));
                        
                        vec4 mvPosition = viewMatrix * worldPos;
                        vFogDepth = -mvPosition.z;
                        
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    uniform float uTime;
                    uniform vec3 uSunPosition;
                    uniform float uSunIntensity;
                    uniform vec3 uFogColor;
                    uniform float uFogDensity;
                    uniform float uIsNight;
                    
                    varying vec2 vUv;
                    varying vec3 vWorldPos;
                    varying vec3 vNormal;
                    varying float vFogDepth;
                    
                    void main() {
                        vec3 viewDir = normalize(cameraPosition - vWorldPos);
                        vec3 sunDir = normalize(uSunPosition);
                        
                        // Fresnel
                        float fresnel = pow(1.0 - max(dot(viewDir, vNormal), 0.0), 3.0);
                        
                        // Specular
                        vec3 halfDir = normalize(viewDir + sunDir);
                        float spec = pow(max(dot(vNormal, halfDir), 0.0), 128.0);
                        
                        // Base water color
                        vec3 deepColor = vec3(0.02, 0.08, 0.15);
                        vec3 shallowColor = vec3(0.1, 0.3, 0.4);
                        vec3 waterColor = mix(deepColor, shallowColor, fresnel * 0.5);
                        
                        // Reflection color
                        vec3 reflectColor = uIsNight > 0.5 ? vec3(0.05, 0.05, 0.1) : uFogColor;
                        waterColor = mix(waterColor, reflectColor, fresnel * 0.6);
                        
                        // Specular highlight
                        vec3 specColor = uIsNight > 0.5 ? vec3(0.8, 0.8, 1.0) : vec3(1.0, 1.0, 0.9);
                        waterColor += specColor * spec * uSunIntensity * 0.5;
                        
                        // Sun path reflection at night
                        if (uIsNight > 0.5) {
                            float sunPath = pow(max(dot(viewDir, sunDir), 0.0), 256.0);
                            waterColor += vec3(1.0, 0.9, 0.7) * sunPath * 2.0;
                        }
                        
                        // Fog
                        float fogFactor = 1.0 - exp(-uFogDensity * 0.0005 * vFogDepth * vFogDepth);
                        fogFactor = clamp(fogFactor, 0.0, 1.0);
                        waterColor = mix(waterColor, uFogColor, fogFactor);
                        
                        gl_FragColor = vec4(waterColor, 0.95);
                    }
                `,
                transparent: true,
                side: THREE.DoubleSide
            });
            
            water = new THREE.Mesh(waterGeometry, waterMaterial);
            water.rotation.x = -Math.PI / 2;
            water.position.y = 0;
            water.receiveShadow = true;
            scene.add(water);
        }

        // ============ BRIDGE ============
        function createBridge() {
            bridgeGroup = new THREE.Group();
            
            const bridgeOrange = new THREE.MeshStandardMaterial({
                color: 0xc4531b,
                metalness: 0.3,
                roughness: 0.7
            });
            
            const cableMaterial = new THREE.MeshStandardMaterial({
                color: 0x8b4513,
                metalness: 0.5,
                roughness: 0.6
            });
            
            // Bridge dimensions
            const towerHeight = 70;
            const mainSpan = 420;
            const sideSpan = 180;
            const roadWidth = 28;
            const towerWidth = 10;
            const deckHeight = 8;
            
            // Tower positions
            const towerPositions = [
                new THREE.Vector3(-mainSpan/2 - sideSpan, 0, 0),
                new THREE.Vector3(-mainSpan/2, 0, 0),
                new THREE.Vector3(mainSpan/2, 0, 0),
                new THREE.Vector3(mainSpan/2 + sideSpan, 0, 0)
            ];
            
            // Create towers
            towerPositions.forEach((pos, idx) => {
                if (idx === 0 || idx === 3) {
                    // Anchor towers (shorter)
                    createTower(pos, towerHeight * 0.4, towerWidth, bridgeOrange, true);
                } else {
                    // Main towers
                    createTower(pos, towerHeight, towerWidth, bridgeOrange, false);
                }
            });
            
            // Road deck
            const deckGeometry = new THREE.BoxGeometry(mainSpan + sideSpan * 2, deckHeight, roadWidth);
            const deck = new THREE.Mesh(deckGeometry, bridgeMaterial());
            deck.position.set(0, towerHeight - deckHeight/2 - 2, 0);
            deck.castShadow = true;
            deck.receiveShadow = true;
            bridgeGroup.add(deck);
            
            // Main cables (catenary)
            const cableRadius = 1.2;
            const cableSegments = 100;
            
            [-roadWidth/4, roadWidth/4].forEach(z => {
                // Main span cable
                createCable(
                    new THREE.Vector3(-mainSpan/2, towerHeight - 5, z),
                    new THREE.Vector3(mainSpan/2, towerHeight - 5, z),
                    towerHeight,
                    cableRadius,
                    cableSegments,
                    cableMaterial
                );
                
                // Side span cables
                createCable(
                    new THREE.Vector3(-mainSpan/2 - sideSpan, towerHeight * 0.4, z),
                    new THREE.Vector3(-mainSpan/2, towerHeight - 5, z),
                    towerHeight,
                    cableRadius * 0.8,
                    50,
                    cableMaterial
                );
                
                createCable(
                    new THREE.Vector3(mainSpan/2, towerHeight - 5, z),
                    new THREE.Vector3(mainSpan/2 + sideSpan, towerHeight * 0.4, z),
                    towerHeight,
                    cableRadius * 0.8,
                    50,
                    cableMaterial
                );
            });
            
            // Suspender cables
            createSuspenders(mainSpan, towerHeight, roadWidth);
            
            // Piers
            createPier(new THREE.Vector3(-mainSpan/2 - sideSpan + 20, 0, 0), 15, towerHeight - 15);
            createPier(new THREE.Vector3(mainSpan/2 + sideSpan - 20, 0, 0), 15, towerHeight - 15);
            
            // Road surface
            const roadGeometry = new THREE.PlaneGeometry(mainSpan + sideSpan * 2, roadWidth - 4);
            const roadMaterial = new THREE.MeshStandardMaterial({
                color: 0x333333,
                roughness: 0.9
            });
            const road = new THREE.Mesh(roadGeometry, roadMaterial);
            road.rotation.x = -Math.PI / 2;
            road.position.set(0, towerHeight - deckHeight - 0.1, 0);
            road.receiveShadow = true;
            bridgeGroup.add(road);
            
            // Sidewalk
            [-roadWidth/2 + 2, roadWidth/2 - 2].forEach(z => {
                const sidewalkGeo = new THREE.PlaneGeometry(mainSpan + sideSpan * 2, 3);
                const sidewalkMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.8 });
                const sidewalk = new THREE.Mesh(sidewalkGeo, sidewalkMat);
                sidewalk.rotation.x = -Math.PI / 2;
                sidewalk.position.set(0, towerHeight - deckHeight + 0.1, z);
                sidewalk.receiveShadow = true;
                bridgeGroup.add(sidewalk);
            });
            
            scene.add(bridgeGroup);
        }

        function createTower(position, height, width, material, isAnchor) {
            const towerGroup = new THREE.Group();
            
            // Main tower legs
            const legGeo = new THREE.BoxGeometry(width * 0.3, height, width * 0.3);
            const legPositions = [
                [-width/2, 0, -width/2],
                [-width/2, 0, width/2],
                [width/2, 0, -width/2],
                [width/2, 0, width/2]
            ];
            
            legPositions.forEach(pos => {
                const leg = new THREE.Mesh(legGeo, material);
                leg.position.set(pos[0], height/2, pos[2]);
                leg.castShadow = true;
                leg.receiveShadow = true;
                towerGroup.add(leg);
            });
            
            // Cross braces
            const braceCount = Math.floor(height / 15);
            for (let i = 1; i < braceCount; i++) {
                const y = (i / braceCount) * height;
                const braceHeight = 4;
                
                // Horizontal braces
                const hBraceGeo = new THREE.BoxGeometry(width * 0.4, braceHeight, width * 0.2);
                [-width/2, width/2].forEach(x => {
                    const hBrace = new THREE.Mesh(hBraceGeo, material);
                    hBrace.position.set(x, y, 0);
                    hBrace.castShadow = true;
                    towerGroup.add(hBrace);
                });
                
                // Diagonal braces
                const diagGeo = new THREE.BoxGeometry(width * 0.6, braceHeight, width * 0.2);
                const diagAngle = 0.3;
                const diag1 = new THREE.Mesh(diagGeo, material);
                diag1.position.set(0, y, 0);
                diag1.rotation.z = diagAngle;
                diag1.castShadow = true;
                towerGroup.add(diag1);
                
                const diag2 = new THREE.Mesh(diagGeo, material);
                diag2.position.set(0, y + 3, 0);
                diag2.rotation.z = -diagAngle;
                diag2.castShadow = true;
                towerGroup.add(diag2);
            }
            
            // Decorative top
            const capGeo = new THREE.BoxGeometry(width * 0.5, 5, width * 0.5);
            const cap = new THREE.Mesh(capGeo, material);
            cap.position.set(0, height + 2.5, 0);
            cap.castShadow = true;
            towerGroup.add(cap);
            
            // Art deco ornament
            const ornamentGeo = new THREE.ConeGeometry(width * 0.15, 8, 8);
            const ornament = new THREE.Mesh(ornamentGeo, material);
            ornament.position.set(0, height + 12, 0);
            ornament.castShadow = true;
            towerGroup.add(ornament);
            
            towerGroup.position.copy(position);
            bridgeGroup.add(towerGroup);
        }

        function createCable(start, end, towerHeight, radius, segments, material) {
            const curve = new THREE.CatmullRomCurve3([
                start,
                new THREE.Vector3(
                    (start.x + end.x) / 2,
                    Math.min(start.y, end.y) - (towerHeight * 0.15),
                    (start.z + end.z) / 2
                ),
                end
            ]);
            
            const tubeGeo = new THREE.TubeGeometry(curve, segments, radius, 8, false);
            const cable = new THREE.Mesh(tubeGeo, material);
            cable.castShadow = true;
            bridgeGroup.add(cable);
        }

        function createSuspenders(mainSpan, towerHeight, roadWidth) {
            const suspenderMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.5 });
            const spacing = 15;
            const count = Math.floor(mainSpan / spacing);
            
            for (let i = 0; i <= count; i++) {
                const x = -mainSpan/2 + i * spacing;
                const sag = getCatenaryY(x, mainSpan, towerHeight);
                const y = towerHeight - 5 - sag;
                
                [-roadWidth/4, roadWidth/4].forEach(z => {
                    const height = (towerHeight - 5) - sag - (towerHeight - 10);
                    if (height > 1) {
                        const suspGeo = new THREE.CylinderGeometry(0.1, 0.1, height, 4);
                        const susp = new THREE.Mesh(suspGeo, suspenderMat);
                        susp.position.set(x, y + height/2, z);
                        bridgeGroup.add(susp);
                    }
                });
            }
        }

        function getCatenaryY(x, span, height) {
            const normalized = (x + span/2) / span;
            return (height * 0.15) * (1 - Math.pow(2 * normalized - 1, 4) * 0.8);
        }

        function createPier(position, width, height) {
            const pierMat = bridgeMaterial();
            
            // Main pier body
            const pierGeo = new THREE.BoxGeometry(width * 2, height, width * 1.5);
            const pier = new THREE.Mesh(pierGeo, pierMat);
            pier.position.copy(position);
            pier.position.y = height / 2;
            pier.castShadow = true;
            pier.receiveShadow = true;
            bridgeGroup.add(pier);
            
            // Base widening
            const baseGeo = new THREE.BoxGeometry(width * 2.5, 5, width * 2);
            const base = new THREE.Mesh(baseGeo, pierMat);
            base.position.copy(position);
            base.position.y = 2.5;
            base.castShadow = true;
            bridgeGroup.add(base);
        }

        function bridgeMaterial() {
            return new THREE.MeshStandardMaterial({
                color: 0xc4531b,
                metalness: 0.3,
                roughness: 0.7
            });
        }

        // ============ TERRAIN ============
        function createTerrain() {
            const terrainMat = new THREE.MeshStandardMaterial({
                color: 0x3d5c3d,
                roughness: 0.9
            });
            
            // Marin Headlands (north side)
            const marinShape = new THREE.Shape();
            marinShape.moveTo(-300, -50);
            marinShape.lineTo(-200, -30);
            marinShape.lineTo(-150, -10);
            marinShape.lineTo(-100, 20);
            marinShape.lineTo(-80, 50);
            marinShape.lineTo(-60, 80);
            marinShape.lineTo(-40, 60);
            marinShape.lineTo(-20, 30);
            marinShape.lineTo(0, 10);
            marinShape.lineTo(-50, -30);
            marinShape.lineTo(-150, -60);
            marinShape.lineTo(-300, -80);
            marinShape.closePath();
            
            const marinGeo = new THREE.ExtrudeGeometry(marinShape, {
                depth: 150,
                bevelEnabled: false
            });
            const marin = new THREE.Mesh(marinGeo, terrainMat);
            marin.rotation.x = -Math.PI / 2;
            marin.position.set(-250, 0, 80);
            marin.castShadow = true;
            marin.receiveShadow = true;
            scene.add(marin);
            
            // Marin hills
            const hillPositions = [
                [-180, 45], [-140, 55], [-100, 40]
            ];
            hillPositions.forEach(([x, h]) => {
                const hillGeo = new THREE.ConeGeometry(30, h, 8);
                const hill = new THREE.Mesh(hillGeo, terrainMat);
                hill.position.set(x, h/2, 100);
                hill.castShadow = true;
                scene.add(hill);
            });
            
            // SF Peninsula (south side)
            const sfShape = new THREE.Shape();
            sfShape.moveTo(200, -200);
            sfShape.lineTo(300, -150);
            sfShape.lineTo(400, -100);
            sfShape.lineTo(450, -50);
            sfShape.lineTo(500, 0);
            sfShape.lineTo(450, 50);
            sfShape.lineTo(350, 80);
            sfShape.lineTo(250, 50);
            sfShape.lineTo(200, 0);
            sfShape.lineTo(180, -50);
            sfShape.lineTo(200, -100);
            sfShape.closePath();
            
            const sfGeo = new THREE.ExtrudeGeometry(sfShape, {
                depth: 100,
                bevelEnabled: false
            });
            const sf = new THREE.Mesh(sfGeo, terrainMat);
            sf.rotation.x = -Math.PI / 2;
            sf.position.set(250, 0, -80);
            sf.castShadow = true;
            sf.receiveShadow = true;
            scene.add(sf);
            
            // Presidio area
            const presidioGeo = new THREE.BoxGeometry(80, 15, 60);
            const presidio = new THREE.Mesh(presidioGeo, terrainMat);
            presidio.position.set(100, 7.5, -50);
            presidio.castShadow = true;
            scene.add(presidio);
        }

        // ============ SKYLINE ============
        function createSkyline() {
            const buildingMat = new THREE.MeshStandardMaterial({
                color: 0x445566,
                roughness: 0.8
            });
            
            const windowMat = new THREE.MeshStandardMaterial({
                color: 0xffeeaa,
                emissive: 0x332200,
                emissiveIntensity: 0
            });
            
            const buildingCount = 60;
            const cityGroup = new THREE.Group();
            
            for (let i = 0; i < buildingCount; i++) {
                const width = 8 + Math.random() * 12;
                const depth = 8 + Math.random() * 12;
                const height = 15 + Math.random() * 60;
                
                const buildingGeo = new THREE.BoxGeometry(width, height, depth);
                const building = new THREE.Mesh(buildingGeo, buildingMat);
                
                const x = 150 + Math.random() * 300;
                const z = -80 - Math.random() * 150;
                
                building.position.set(x, height/2, z);
                building.castShadow = true;
                building.receiveShadow = true;
                cityGroup.add(building);
                
                // Add windows (simplified)
                if (Math.random() > 0.3) {
                    const windowGeo = new THREE.PlaneGeometry(width * 0.8, height * 0.8);
                    const windows = new THREE.Mesh(windowGeo, windowMat.clone());
                    windows.position.set(x, height/2, z - depth/2 - 0.1);
                    windows.userData.isWindow = true;
                    cityGroup.add(windows);
                }
            }
            
            cityGroup.userData.isSkyline = true;
            scene.add(cityGroup);
        }

        // ============ CARS ============
        let carInstances = { northbound: null, southbound: null };
        let carCount = { northbound: 0, southbound: 0 };
        let carPositions = { northbound: [], southbound: [] };
        let carVelocities = { northbound: [], southbound: [] };

        function createCars() {
            const maxCars = 400;
            const mainSpan = 420;
            const sideSpan = 180;
            const roadWidth = 28;
            
            // Car geometry (small box)
            const carBodyGeo = new THREE.BoxGeometry(4, 1.5, 2);
            const carMaterial = new THREE.MeshStandardMaterial({
                color: 0x4488cc,
                metalness: 0.6,
                roughness: 0.4
            });
            
            // Northbound cars (on right side)
            const northGeo = new THREE.BoxGeometry(4, 1.5, 2);
            carInstances.northbound = new THREE.InstancedMesh(northGeo, carMaterial, maxCars/2);
            carInstances.northbound.castShadow = true;
            carInstances.northbound.count = 0;
            scene.add(carInstances.northbound);
            
            // Southbound cars
            const southGeo = new THREE.BoxGeometry(4, 1.5, 2);
            const southMaterial = carMaterial.clone();
            carInstances.southbound = new THREE.InstancedMesh(southGeo, southMaterial, maxCars/2);
            carInstances.southbound.castShadow = true;
            carInstances.southbound.count = 0;
            scene.add(carInstances.southbound);
            
            // Initialize car positions
            const totalLength = mainSpan + sideSpan * 2;
            
            for (let i = 0; i < maxCars/2; i++) {
                const direction = Math.random() > 0.5 ? 1 : -1;
                const x = (Math.random() - 0.5) * totalLength;
                const z = direction > 0 ? -6 : 6;
                
                carPositions.northbound.push(new THREE.Vector3(x, 63, z - 4));
                carVelocities.northbound.push(0.3 + Math.random() * 0.4);
            }
            
            for (let i = 0; i < maxCars/2; i++) {
                const direction = Math.random() > 0.5 ? 1 : -1;
                const x = (Math.random() - 0.5) * totalLength;
                const z = direction > 0 ? 6 : -6;
                
                carPositions.southbound.push(new THREE.Vector3(x, 63, z + 4));
                carVelocities.southbound.push(0.3 + Math.random() * 0.4);
            }
            
            updateCarCount();
        }

        function updateCarCount() {
            const maxCars = 400;
            const northCount = Math.floor(maxCars * params.trafficDensity / 100 / 2);
            const southCount = Math.floor(maxCars * params.trafficDensity / 100 / 2);
            
            const totalLength = 420 + 180 * 2;
            const matrix = new THREE.Matrix4();
            const quaternion = new THREE.Quaternion();
            
            // Northbound
            for (let i = 0; i < maxCars/2; i++) {
                if (i < northCount) {
                    const pos = carPositions.northbound[i];
                    quaternion.setFromAxisAngle(new THREE.Vector3(0, 1, 0), 0);
                    matrix.compose(pos, quaternion, new THREE.Vector3(1, 1, 1));
                    carInstances.northbound.setMatrixAt(i, matrix);
                }
                carInstances.northbound.setColorAt(i, new THREE.Color(0x4488cc));
            }
            carInstances.northbound.count = northCount;
            carInstances.northbound.instanceMatrix.needsUpdate = true;
            if (carInstances.northbound.instanceColor) carInstances.northbound.instanceColor.needsUpdate = true;
            
            // Southbound
            for (let i = 0; i < maxCars/2; i++) {
                if (i < southCount) {
                    const pos = carPositions.southbound[i];
                    quaternion.setFromAxisAngle(new THREE.Vector3(0, 1, 0), Math.PI);
                    matrix.compose(pos, quaternion, new THREE.Vector3(1, 1, 1));
                    carInstances.southbound.setMatrixAt(i, matrix);
                }
                carInstances.southbound.setColorAt(i, new THREE.Color(0xcc4444));
            }
            carInstances.southbound.count = southCount;
            carInstances.southbound.instanceMatrix.needsUpdate = true;
            if (carInstances.southbound.instanceColor) carInstances.southbound.instanceColor.needsUpdate = true;
        }

        function updateCars(delta) {
            const totalLength = 420 + 180 * 2;
            const maxCars = 200;
            
            // Update northbound
            for (let i = 0; i < carInstances.northbound.count; i++) {
                const pos = carPositions.northbound[i];
                pos.x += carVelocities.northbound[i] * delta * 30;
                
                if (pos.x > totalLength / 2) pos.x = -totalLength / 2;
                if (pos.x < -totalLength / 2) pos.x = totalLength / 2;
            }
            
            // Update southbound
            for (let i = 0; i < carInstances.southbound.count; i++) {
                const pos = carPositions.southbound[i];
                pos.x -= carVelocities.southbound[i] * delta * 30;
                
                if (pos.x < -totalLength / 2) pos.x = totalLength / 2;
                if (pos.x > totalLength / 2) pos.x = -totalLength / 2;
            }
            
            updateCarCount();
        }

        // ============ CAR LIGHTS ============
        let carLights = { headlights: [], taillights: [] };

        function updateCarLights() {
            const isNight = params.time < 6 || params.time > 19;
            const intensity = isNight ? 2 : 0;
            
            // Headlights
            if (carLights.headlights.length === 0) {
                const headlightGeo = new THREE.SphereGeometry(0.3, 8, 8);
                const headlightMat = new THREE.MeshStandardMaterial({
                    color: 0xffffcc,
                    emissive: 0xffffcc,
                    emissiveIntensity: intensity
                });
                
                for (let i = 0; i < 50; i++) {
                    const light = new THREE.Mesh(headlightGeo, headlightMat.clone());
                    light.position.set(0, 62.5, -7);
                    scene.add(light);
                    carLights.headlights.push(light);
                }
            }
            
            carLights.headlights.forEach(light => {
                light.material.emissiveIntensity = intensity;
                light.visible = isNight;
            });
            
            // Taillights
            if (carLights.taillights.length === 0) {
                const taillightGeo = new THREE.SphereGeometry(0.25, 8, 8);
                const taillightMat = new THREE.MeshStandardMaterial({
                    color: 0xff0000,
                    emissive: 0xff0000,
                    emissiveIntensity: intensity
                });
                
                for (let i = 0; i < 50; i++) {
                    const light = new THREE.Mesh(taillightGeo, taillightMat.clone());
                    light.position.set(0, 62.5, -5);
                    scene.add(light);
                    carLights.taillights.push(light);
                }
            }
            
            carLights.taillights.forEach(light => {
                light.material.emissiveIntensity = intensity;
                light.visible = isNight;
            });
        }

        // ============ SHIPS ============
        function createShips() {
            const shipCount = 3;
            
            for (let i = 0; i < shipCount; i++) {
                const shipGroup = new THREE.Group();
                
                // Hull
                const hullGeo = new THREE.BoxGeometry(40, 8, 12);
                const hullMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
                const hull = new THREE.Mesh(hullGeo, hullMat);
                hull.position.y = 2;
                shipGroup.add(hull);
                
                // Cabin
                const cabinGeo = new THREE.BoxGeometry(15, 10, 10);
                const cabinMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
                const cabin = new THREE.Mesh(cabinGeo, cabinMat);
                cabin.position.set(-10, 9, 0);
                shipGroup.add(cabin);
                
                // Navigation lights
                const navLightGeo = new THREE.SphereGeometry(0.5, 8, 8);
                
                const redLightMat = new THREE.MeshStandardMaterial({
                    color: 0xff0000,
                    emissive: 0xff0000,
                    emissiveIntensity: 2
                });
                const greenLightMat = new THREE.MeshStandardMaterial({
                    color: 0x00ff00,
                    emissive: 0x00ff00,
                    emissiveIntensity: 2
                });
                const whiteLightMat = new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    emissive: 0xffffff,
                    emissiveIntensity: 2
                });
                
                const redLight = new THREE.Mesh(navLightGeo, redLightMat);
                redLight.position.set(0, 6, -6);
                shipGroup.add(redLight);
                
                const greenLight = new THREE.Mesh(navLightGeo, greenLightMat);
                greenLight.position.set(0, 6, 6);
                shipGroup.add(greenLight);
                
                const whiteLight = new THREE.Mesh(navLightGeo, whiteLightMat);
                whiteLight.position.set(0, 12, 0);
                shipGroup.add(whiteLight);
                
                // Position ships
                shipGroup.position.set(
                    -200 + i * 150,
                    2,
                    -50 - i * 30
                );
                
                shipGroup.userData = {
                    velocity: new THREE.Vector3(0.02 + Math.random() * 0.03, 0, 0),
                    navLights: [redLight, greenLight, whiteLight]
                };
                
                scene.add(shipGroup);
                ships.push(shipGroup);
            }
        }

        function updateShips(delta) {
            ships.forEach(ship => {
                ship.position.add(ship.userData.velocity);
                
                // Reset position when off screen
                if (ship.position.x > 400) {
                    ship.position.x = -400;
                    ship.position.z = -50 - Math.random() * 100;
                }
            });
        }

        // ============ BIRDS ============
        function createBirds() {
            const birdCount = 30;
            const birdGeo = new THREE.ConeGeometry(0.5, 2, 4);
            birdGeo.rotateX(Math.PI / 2);
            
            const birdMat = new THREE.MeshStandardMaterial({
                color: 0x222222,
                flatShading: true
            });
            
            for (let i = 0; i < birdCount; i++) {
                const bird = new THREE.Mesh(birdGeo, birdMat);
                bird.position.set(
                    (Math.random() - 0.5) * 200,
                    50 + Math.random() * 30,
                    (Math.random() - 0.5) * 100
                );
                
                bird.userData = {
                    baseY: bird.position.y,
                    phase: Math.random() * Math.PI * 2,
                    flapSpeed: 5 + Math.random() * 3,
                    wanderAngle: Math.random() * Math.PI * 2,
                    wanderSpeed: 0.5 + Math.random() * 0.5
                };
                
                scene.add(bird);
                birds.push(bird);
            }
        }

        function updateBirds(delta, time) {
            birds.forEach((bird, i) => {
                // Flapping motion
                bird.rotation.z = Math.sin(time * bird.userData.flapSpeed + bird.userData.phase) * 0.3;
                
                // Gentle wandering
                bird.userData.wanderAngle += (Math.random() - 0.5) * 0.1;
                bird.position.x += Math.cos(bird.userData.wanderAngle) * bird.userData.wanderSpeed;
                bird.position.z += Math.sin(bird.userData.wanderAngle) * bird.userData.wanderSpeed * 0.5;
                
                // Slight Y variation
                bird.position.y = bird.userData.baseY + Math.sin(time + bird.userData.phase) * 2;
                
                // Face direction
                bird.rotation.y = bird.userData.wanderAngle;
                
                // Wrap around
                if (bird.position.x > 300) bird.position.x = -300;
                if (bird.position.x < -300) bird.position.x = 300;
                if (bird.position.z > 100) bird.position.z = -100;
                if (bird.position.z < -100) bird.position.z = 100;
            });
        }

        // ============ FOG SYSTEM ============
        function createFogSystem() {
            const particleCount = 2000;
            const positions = new Float32Array(particleCount * 3);
            const sizes = new Float32Array(particleCount);
            
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 1000;
                positions[i * 3 + 1] = Math.random() * 60;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 500;
                sizes[i] = 20 + Math.random() * 40;
            }
            
            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: {
                    uFogColor: { value: new THREE.Color(0xcccccc) },
                    uFogDensity: { value: 0.3 },
                    uTime: { value: 0 }
                },
                vertexShader: `
                    attribute float size;
                    varying float vFogDepth;
                    uniform float uFogDensity;
                    uniform float uTime;
                    
                    void main() {
                        vec3 pos = position;
                        pos.x += sin(uTime * 0.1 + position.z * 0.01) * 5.0;
                        pos.y += sin(uTime * 0.15 + position.x * 0.01) * 2.0;
                        
                        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                        vFogDepth = -mvPosition.z;
                        
                        float fogFactor = 1.0 - exp(-uFogDensity * 0.0003 * vFogDepth * vFogDepth);
                        gl_PointSize = size * (200.0 / -mvPosition.z);
                        gl_PointSize = clamp(gl_PointSize, 5.0, 100.0);
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    uniform vec3 uFogColor;
                    uniform float uFogDensity;
                    varying float vFogDepth;
                    
                    void main() {
                        float fogFactor = 1.0 - exp(-uFogDensity * 0.0003 * vFogDepth * vFogDepth);
                        fogFactor = clamp(fogFactor, 0.0, 0.8);
                        
                        float dist = length(gl_PointCoord - vec2(0.5));
                        if (dist > 0.5) discard;
                        
                        float alpha = (1.0 - dist * 2.0) * fogFactor * 0.3;
                        gl_FragColor = vec4(uFogColor, alpha);
                    }
                `,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });
            
            fogParticles = new THREE.Points(geometry, material);
            scene.add(fogParticles);
        }

        function updateFogColor() {
            const t = params.time;
            const isNight = t < 6 || t > 19;
            const isGoldenHour = (t > 17 && t < 20) || (t > 5 && t < 7);
            
            if (isNight) {
                fogParticles.material.uniforms.uFogColor.value.setHex(0x1a1a2e);
            } else if (isGoldenHour) {
                fogParticles.material.uniforms.uFogColor.value.setHex(0xffaa77);
            } else {
                fogParticles.material.uniforms.uFogColor.value.setHex(0xaaccdd);
            }
        }

        // ============ STREET LIGHTS ============
        let streetLights = [];

        function createStreetLights() {
            const lightCount = 20;
            const mainSpan = 420;
            const sideSpan = 180;
            
            for (let i = 0; i < lightCount; i++) {
                const x = -mainSpan/2 + (i / (lightCount - 1)) * mainSpan;
                const side = i % 2 === 0 ? -1 : 1;
                
                // Pole
                const poleGeo = new THREE.CylinderGeometry(0.2, 0.3, 8, 8);
                const poleMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
                const pole = new THREE.Mesh(poleGeo, poleMat);
                pole.position.set(x, 64, side * 12);
                scene.add(pole);
                
                // Light fixture
                const fixtureGeo = new THREE.SphereGeometry(0.8, 8, 8);
                const fixtureMat = new THREE.MeshStandardMaterial({
                    color: 0xffffaa,
                    emissive: 0xffffaa,
                    emissiveIntensity: 0
                });
                const fixture = new THREE.Mesh(fixtureGeo, fixtureMat);
                fixture.position.set(x, 69, side * 12);
                scene.add(fixture);
                
                streetLights.push(fixture);
            }
            
            // Bridge warning beacons at tower tops
            const beaconGeo = new THREE.SphereGeometry(1.5, 16, 16);
            const beaconMat = new THREE.MeshStandardMaterial({
                color: 0xff0000,
                emissive: 0xff0000,
                emissiveIntensity: 0
            });
            
            const beaconPositions = [
                [-210, 72, 0], [210, 72, 0]
            ];
            
            beaconPositions.forEach(pos => {
                const beacon = new THREE.Mesh(beaconGeo, beaconMat.clone());
                beacon.position.set(...pos);
                beacon.userData.isBeacon = true;
                scene.add(beacon);
                streetLights.push(beacon);
            });
        }

        function updateStreetLights(time) {
            const isNight = params.time < 6 || params.time > 19;
            
            streetLights.forEach(light => {
                if (light.userData.isBeacon) {
                    // Beacon blinking
                    const blink = Math.sin(time * 3) > 0;
                    light.material.emissiveIntensity = isNight && blink ? 3 : 0;
                    light.visible = true;
                } else {
                    light.material.emissiveIntensity = isNight ? 1.5 : 0;
                }
            });
            
            // Update skyline windows
            scene.traverse(obj => {
                if (obj.userData && obj.userData.isWindow) {
                    obj.material.emissiveIntensity = isNight ? 0.5 : 0;
                }
            });
        }

        // ============ EVENT LISTENERS ============
        function setupEventListeners() {
            // Time slider
            document.getElementById('timeSlider').addEventListener('input', (e) => {
                params.time = parseFloat(e.target.value);
                updateTimeDisplay();
            });
            
            // Fog slider
            document.getElementById('fogSlider').addEventListener('input', (e) => {
                params.fogDensity = parseInt(e.target.value);
                document.getElementById('fogValue').textContent = params.fogDensity + '%';
                fogParticles.material.uniforms.uFogDensity.value = params.fogDensity / 100;
                waterMaterial.uniforms.uFogDensity.value = params.fogDensity / 100;
            });
            
            // Traffic slider
            document.getElementById('trafficSlider').addEventListener('input', (e) => {
                params.trafficDensity = parseInt(e.target.value);
                document.getElementById('trafficValue').textContent = params.trafficDensity + '%';
                updateCarCount();
            });
            
            // Zoom slider
            document.getElementById('zoomSlider').addEventListener('input', (e) => {
                params.zoomDistance = parseInt(e.target.value);
                document.getElementById('zoomValue').textContent = params.zoomDistance;
                camera.position.z = params.zoomDistance;
            });
            
            // Window resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function updateTimeDisplay() {
            const hours = Math.floor(params.time);
            const minutes = Math.floor((params.time % 1) * 60);
            const timeStr = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
            document.getElementById('timeDisplay').textContent = timeStr;
            document.getElementById('timeValue').textContent = timeStr;
        }

        // ============ ANIMATION LOOP ============
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = Math.min(clock.getDelta(), 0.1);
            const time = clock.getElapsedTime();
            
            // Update controls
            controls.update();
            
            // Update lighting
            updateLighting();
            
            // Update water
            waterMaterial.uniforms.uTime.value = time;
            waterMaterial.uniforms.uSunPosition.value.copy(sunLight.position);
            waterMaterial.uniforms.uSunIntensity.value = sunLight.intensity;
            waterMaterial.uniforms.uIsNight.value = (params.time < 6 || params.time > 19) ? 1 : 0;
            
            // Update fog particles
            fogParticles.material.uniforms.uTime.value = time;
            
            // Update birds
            updateBirds(delta, time);
            
            // Update cars
            updateCars(delta);
            
            // Update ships
            updateShips(delta);
            
            // Update street lights
            updateStreetLights(time);
            
            // Render
            composer.render();
            
            // FPS counter
            frameCount++;
            if (time - lastFpsTime >= 1) {
                document.getElementById('fps').textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsTime = time;
            }
        }

        // ============ START ============
        init();
    </script>
</body>
